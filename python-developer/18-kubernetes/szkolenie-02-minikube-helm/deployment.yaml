apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flask-demo
  template:
    metadata:
      labels:
        app: flask-demo
    spec:
      containers:
        - name: flask
          image: flask-k8s-demo:1.0
          imagePullPolicy: Never       # użyj lokalnego obrazu (nie pobieraj z rejestru)
          ports:
            - containerPort: 5000
          livenessProbe:               # sprawdzanie, czy kontener żyje
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: flask-demo-service
spec:
  selector:
    app: flask-demo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: NodePort
