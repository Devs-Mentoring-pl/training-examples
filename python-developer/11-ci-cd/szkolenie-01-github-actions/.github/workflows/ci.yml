# .github/workflows/ci.yml
#
# Pipeline CI: linting (Ruff) + testy (pytest)
# Uruchamiany przy push do main/develop oraz pull requestach do main.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Analiza kodu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja Pythona
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalacja Ruffa
        run: pip install ruff

      - name: Ruff – sprawdzenie kodu
        run: ruff check . --output-format=github

      - name: Ruff – sprawdzenie formatowania
        run: ruff format --check .

  test:
    name: Testy
    runs-on: ubuntu-latest
    needs: lint                    # Czeka na ukończenie joba "lint"

    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja Pythona
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Uruchomienie testów z coverage
        run: pytest --cov=src --cov-report=term-missing --tb=short
