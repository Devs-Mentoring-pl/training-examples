# .github/workflows/docker.yml
#
# Pipeline Docker: budowanie i pushowanie obrazu do GitHub Container Registry (GHCR).
# Uruchamiany przy push do main.

name: Build & Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    # Wymagane uprawnienia do pushowania do GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Logowanie do GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadane obrazu Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Budowanie i pushowanie obrazu
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
