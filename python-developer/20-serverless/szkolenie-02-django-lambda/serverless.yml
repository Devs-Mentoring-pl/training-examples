service: my-lambda-api

provider:
  name: aws
  runtime: python3.12
  region: eu-central-1
  memorySize: 128
  timeout: 30

functions:
  hello:
    handler: lambda_function.lambda_handler
    events:
      - http:
          path: /hello
          method: post
          cors: true

plugins:
  - serverless-python-requirements  # automatycznie pakuje zależności
