<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aplikacja Flask{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Moja Aplikacja</a>
            <div class="navbar-nav">
                {% if session.get("nick") %}
                    <a class="nav-link" href="{{ url_for('dashboard.dashboard_page') }}">
                        Dashboard
                    </a>
                    <a class="nav-link" href="{{ url_for('logout.logout') }}">
                        Wyloguj ({{ session["nick"] }})
                    </a>
                {% else %}
                    <a class="nav-link" href="{{ url_for('login.login') }}">Zaloguj się</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
